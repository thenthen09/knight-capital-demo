name: Knight Capital Guard

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Scan dangerous code
        run: |
          echo "Scanning..."
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "❌ Found dangerous code!"
            exit 1
          fi

      - name: Build project
        run: mvn package
